{% extends 'base.html' %}
{% block page_title %}Create Purchase Order{% endblock %}
{% block breadcrumb %}Create PO{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-11">
        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="card-title mb-0">New Purchase Order</h5>
                <a href="{% url 'po_list' %}" class="btn btn-light btn-sm">View POs</a>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Vendor <span class="text-danger">*</span></label>
                            <select name="vendor" class="form-select" required>
                                <option value="" disabled selected>Select vendor</option>
                                {% for v in vendors %}
                                <option value="{{ v.pk }}">{{ v.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <h6 class="mb-3">Items</h6>
                    <div id="itemsContainer">
                        <div class="row g-2 mb-2 item-row align-items-end">
                            <div class="col-md-3">
                                <label class="form-label">Item Name</label>
                                <input type="text" name="item_name" class="form-control" placeholder="Item name" required>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Category</label>
                                <select name="item_category" class="form-select">
                                    <option value="">Select</option>
                                    <option value="Men">Men</option>
                                    <option value="Women">Women</option>
                                    <option value="Kids">Kids</option>
                                    <option value="Jewelry">Jewelry</option>
                                </select>
                            </div>
                            <div class="col-md-1">
                                <label class="form-label">Qty</label>
                                <input type="number" name="item_qty" class="form-control" value="1" min="1">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Price</label>
                                <input type="number" name="item_price" class="form-control" value="0" step="0.01" min="0">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Color</label>
                                <input type="text" name="item_color" class="form-control" placeholder="Red, Blue">
                            </div>
                            <div class="col-md-1">
                                <label class="form-label">Size</label>
                                <input type="text" name="item_size" class="form-control" placeholder="M, L">
                            </div>
                            <div class="col-md-1">
                                <label class="form-label">&nbsp;</label>
                                <button type="button" class="btn btn-soft-danger btn-sm w-100 remove-row">✕</button>
                            </div>
                        </div>
                    </div>

                    <button type="button" class="btn btn-soft-primary btn-sm mt-2" id="addItemBtn">
                        <i class="ri-add-line me-1"></i> Add Item
                    </button>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-success">Create PO</button>
                        <a href="{% url 'po_list' %}" class="btn btn-light">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
const template = document.querySelector('.item-row').cloneNode(true);
document.getElementById('addItemBtn').addEventListener('click', function() {
    const clone = template.cloneNode(true);
    clone.querySelectorAll('input').forEach(i => { if(i.type !== 'number') i.value = ''; else i.value = i.defaultValue; });
    clone.querySelector('select').selectedIndex = 0;
    document.getElementById('itemsContainer').appendChild(clone);
    bindRemove(clone);
});
function bindRemove(row) {
    row.querySelector('.remove-row').addEventListener('click', function() {
        if (document.querySelectorAll('.item-row').length > 1) row.remove();
    });
}
document.querySelectorAll('.remove-row').forEach(btn => bindRemove(btn.closest('.item-row')));
</script>
{% endblock %}
