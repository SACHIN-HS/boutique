{% extends 'vendors/portal_base.html' %}

{% block title %}Vendor Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="avatar-lg mx-auto mb-3">
                        <div class="bg-soft-primary rounded-circle text-primary text-center p-3" style="background-color: #f0edff; width: 80px; height: 80px; display: inline-flex; align-items: center; justify-content: center;">
                            <i class="ri-user-follow-line ri-3x"></i>
                        </div>
                    </div>
                    <h4 class="fw-bold">Vendor Login</h4>
                    <p class="text-muted">Enter your credentials to access the portal</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="ri-mail-line"></i></span>
                            <input type="email" name="email" class="form-control bg-light border-0" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label class="form-label fw-semibold">Password</label>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="ri-lock-2-line"></i></span>
                            <input type="password" name="password" class="form-control bg-light border-0" placeholder="Enter password" required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-3">
                            Login into Portal <i class="ri-arrow-right-line ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
