{% extends 'dashboard/base.html' %}
{% block page_title %}Add Vendor{% endblock %}
{% block breadcrumb %}Add Vendor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header"><h5 class="card-title mb-0">Vendor Details</h5></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" placeholder="Vendor name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" placeholder="vendor@email.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone <span class="text-danger">*</span></label>
                            <input type="text" name="phone" class="form-control" placeholder="+91 ..." required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Address <span class="text-danger">*</span></label>
                            <input type="text" name="address" class="form-control" placeholder="Street, city, state" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Portal Password <span class="text-danger">*</span></label>
                            <input type="password" name="password" class="form-control" placeholder="Create password for vendor" required>
                        </div>
                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-success">Save Vendor</button>
                            <a href="{% url 'vendor_view' %}" class="btn btn-light">View Vendors</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
