{% extends 'vendors/portal_base.html' %}

{% block title %}PO QR - {{ po.po_number }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-transparent border-bottom py-3 text-center">
                <div class="text-muted small">PO ID</div>
                <div class="fs-4 fw-bold text-primary">{{ po.po_number }}</div>
            </div>

            <div class="card-body p-4 text-center">
                <div class="d-inline-block p-3 bg-white rounded" style="border: 1px solid var(--po-border);">
                    <img src="{{ qr_url }}" alt="QR Code for {{ po.po_number }}" class="img-fluid" style="width: 240px; height: 240px;">
                </div>
                <div class="text-muted small mt-3">Scan this QR to open the PO items list.</div>

                <div class="mt-3 d-flex justify-content-center gap-2 flex-wrap">
                    <button type="button" class="btn btn-soft-primary btn-sm" onclick="window.print()">
                        <i class="ri-printer-line me-1"></i> Print
                    </button>
                    <a href="{% url 'portal_history' vendor.portal_token %}" class="btn btn-outline-primary btn-sm">
                        <i class="ri-history-line me-1"></i> History
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
@media print {
    body { background: white !important; }
    .navbar, footer, .btn, .alert { display: none !important; }
    .card { box-shadow: none !important; border: 1px solid #eee !important; }
}
</style>
{% endblock %}
