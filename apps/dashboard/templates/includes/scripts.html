{% load static %}
<!-- ========== SCRIPTS / JS ========== -->

<!-- Bootstrap Bundle JS -->
<script src="{% static 'assets/libs/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

<!-- Simplebar JS -->
<script src="{% static 'assets/libs/simplebar/simplebar.min.js' %}"></script>

<!-- Node Waves JS -->
<script src="{% static 'assets/libs/node-waves/waves.min.js' %}"></script>

<!-- Feather Icons JS -->
<script src="{% static 'assets/libs/feather-icons/feather.min.js' %}"></script>

<!-- Lord Icon JS -->
<script src="{% static 'assets/js/pages/plugins/lord-icon-2.1.0.js' %}"></script>

<!-- Plugins JS -->
<script src="{% static 'assets/js/plugins.js' %}"></script>

<!-- App JS -->
<script src="{% static 'assets/js/app.js' %}"></script>

<!-- Form validation (Bootstrap needs-validation) -->
<script src="{% static 'assets/js/pages/form-validation.init.js' %}"></script>
<script src="{% static 'assets/js/pages/auto-validation-tooltips.init.js' %}"></script>

<!-- SweetAlert2 CDN -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    function confirmDelete(url, name) {
        Swal.fire({
            title: 'Are you sure?',
            text: "You won't be able to revert this!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Yes, delete it!',
            cancelButtonText: 'Cancel',
            customClass: {
                confirmButton: 'btn btn-primary w-xs me-2 mt-2',
                cancelButton: 'btn btn-danger w-xs mt-2',
            },
            buttonsStyling: false,
            showCloseButton: true
        }).then(function (result) {
            if (result.isConfirmed) {
                window.location.href = url;
            }
        });
    }

    function confirmDeleteForm(formId) {
        Swal.fire({
            title: 'Are you sure?',
            text: "You won't be able to revert this!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Yes, delete it!',
            cancelButtonText: 'Cancel',
            customClass: {
                confirmButton: 'btn btn-primary w-xs me-2 mt-2',
                cancelButton: 'btn btn-danger w-xs mt-2',
            },
            buttonsStyling: false,
            showCloseButton: true
        }).then(function (result) {
            if (result.isConfirmed) {
                document.getElementById(formId).submit();
            }
        });
    }
</script>

<!-- Extra JS (child templates inject karte hain) -->
{% block extra_js %}{% endblock %}
<!-- ========== END SCRIPTS ========== -->
