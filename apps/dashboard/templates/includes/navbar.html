{% load static %}
<!-- ========== TOPBAR / NAVBAR ========== -->
<header id="page-topbar">
    <div class="layout-width">
        <div class="navbar-header">

            <div class="d-flex">
                <!-- LOGO (horizontal layout ke liye) -->
                <div class="navbar-brand-box horizontal-logo">
                    <a href="{% url 'dashboard' %}" class="logo logo-dark">
                        <span class="logo-sm">
                            <img src="{% static 'assets/images/logo-sm.png' %}" alt="" height="22">
                        </span>
                        <span class="logo-lg">
                            <img src="{% static 'assets/images/logo-dark.png' %}" alt="" height="17">
                        </span>
                    </a>
                    <a href="{% url 'dashboard' %}" class="logo logo-light">
                        <span class="logo-sm">
                            <img src="{% static 'assets/images/logo-sm.png' %}" alt="" height="22">
                        </span>
                        <span class="logo-lg">
                            <img src="{% static 'assets/images/logo-light.png' %}" alt="" height="17">
                        </span>
                    </a>
                </div>

                <!-- Hamburger Button -->
                <button type="button"
                    class="btn btn-sm px-3 fs-16 header-item vertical-menu-btn topnav-hamburger material-shadow-none"
                    id="topnav-hamburger-icon">
                    <span class="hamburger-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </button>

                <!-- Search Bar -->
                <form class="app-search d-none d-md-block">
                    <div class="position-relative">
                        <input type="text" class="form-control" placeholder="Search..."
                            autocomplete="off" id="search-options">
                        <span class="mdi mdi-magnify search-widget-icon"></span>
                        <span class="mdi mdi-close-circle search-widget-icon search-widget-icon-close d-none"
                            id="search-close-options"></span>
                        <div class="dropdown-menu dropdown-menu-lg" id="search-dropdown">
                            <div class="p-3">
                                <div class="text-muted small">Type to search…</div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Right Side Icons -->
            <div class="d-flex align-items-center">

                <!-- Mobile Search -->
                <div class="dropdown d-md-none topbar-head-dropdown header-item">
                    <button type="button"
                        class="btn btn-icon btn-topbar material-shadow-none btn-ghost-secondary rounded-circle"
                        id="page-header-search-dropdown" data-bs-toggle="dropdown">
                        <i class="bx bx-search fs-22"></i>
                    </button>
                    <div class="dropdown-menu dropdown-menu-lg dropdown-menu-end p-0">
                        <form class="p-3">
                            <div class="input-group">
                                <input type="text" class="form-control" placeholder="Search ...">
                                <button class="btn btn-primary" type="submit">
                                    <i class="mdi mdi-magnify"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Fullscreen -->
                <div class="ms-1 header-item d-none d-sm-flex">
                    <button type="button"
                        class="btn btn-icon btn-topbar material-shadow-none btn-ghost-secondary rounded-circle"
                        data-toggle="fullscreen">
                        <i class='bx bx-fullscreen fs-22'></i>
                    </button>
                </div>

                <!-- Dark / Light Mode -->
                <div class="ms-1 header-item d-none d-sm-flex">
                    <button type="button"
                        class="btn btn-icon btn-topbar material-shadow-none btn-ghost-secondary rounded-circle light-dark-mode">
                        <i class='bx bx-moon fs-22'></i>
                    </button>
                </div>

                <!-- Notifications -->
                <div class="dropdown topbar-head-dropdown ms-1 header-item" id="notificationDropdown">
                    <button type="button"
                        class="btn btn-icon btn-topbar material-shadow-none btn-ghost-secondary rounded-circle"
                        id="page-header-notifications-dropdown"
                        data-bs-toggle="dropdown" data-bs-auto-close="outside">
                        <i class='bx bx-bell fs-22'></i>
                        <span class="position-absolute topbar-badge fs-10 translate-middle badge rounded-pill bg-danger">
                            3<span class="visually-hidden">unread messages</span>
                        </span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-lg dropdown-menu-end p-0">
                        <div class="dropdown-head bg-primary bg-pattern rounded-top">
                            <div class="p-3">
                                <div class="row align-items-center">
                                    <div class="col">
                                        <h6 class="m-0 fs-16 fw-semibold text-white">Notifications</h6>
                                    </div>
                                    <div class="col-auto dropdown-tabs">
                                        <span class="badge bg-light text-body fs-13">4 New</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div data-simplebar style="max-height: 300px;" class="pe-2 p-3">
                            <p class="text-muted text-center mb-0">No new notifications</p>
                        </div>
                        <div class="my-3 text-center">
                            <a href="#" class="btn btn-soft-success btn-sm">View All</a>
                        </div>
                    </div>
                </div>

                <!-- User Profile Dropdown -->
                <div class="dropdown ms-sm-3 header-item topbar-user">
                    <button type="button" class="btn material-shadow-none"
                        id="page-header-user-dropdown"
                        data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <span class="d-flex align-items-center">
                            <img class="rounded-circle header-profile-user"
                                src="{% static 'assets/images/users/avatar-1.jpg' %}" alt="Avatar">
                            <span class="text-start ms-xl-2">
                                <span class="d-none d-xl-inline-block ms-1 fw-medium user-name-text">
                                    {% if request.user.is_authenticated %}
                                        {{ request.user.get_full_name|default:request.user.username }}
                                    {% else %}Admin{% endif %}
                                </span>
                                <span class="d-none d-xl-block ms-1 fs-12 user-name-sub-text">
                                    {% if request.user.is_superuser %}Super Admin{% else %}Staff{% endif %}
                                </span>
                            </span>
                        </span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end">
                        <h6 class="dropdown-header">
                            Welcome {% if request.user.is_authenticated %}{{ request.user.username }}{% endif %}!
                        </h6>
                        <a class="dropdown-item" href="{% url 'admin:index' %}">
                            <i class="mdi mdi-shield-account text-muted fs-16 align-middle me-1"></i>
                            <span class="align-middle">Django Admin</span>
                        </a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="{% url 'logout' %}">
                            <i class="mdi mdi-logout text-muted fs-16 align-middle me-1"></i>
                            <span class="align-middle">Logout</span>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>
</header>
<!-- ========== END TOPBAR ========== -->
