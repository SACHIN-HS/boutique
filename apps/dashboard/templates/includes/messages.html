<!-- ========== DJANGO MESSAGES / ALERTS ========== -->
{% if messages %}
<div class="row">
    <div class="col-12">
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show"
            role="alert">
            <i class="
                {% if message.tags == 'success' %}ri-checkbox-circle-line
                {% elif message.tags == 'error' %}ri-error-warning-line
                {% elif message.tags == 'warning' %}ri-alert-line
                {% else %}ri-information-line{% endif %}
                align-middle me-2"></i>
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
<!-- ========== END MESSAGES ========== -->
